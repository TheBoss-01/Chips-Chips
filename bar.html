<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chips & Chips — Bar (Lounge)</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="game.css"/>
  <style>
    html,body{overflow:hidden;height:100%;}
    body{display:flex;flex-direction:column;}
    .game-area{flex:1;min-height:0;position:relative;display:flex;}
    #bar-wrap{flex:1;position:relative;overflow:hidden;background:#08081a;}
    #bar-canvas{display:block;width:100%;height:100%;image-rendering:pixelated;cursor:default;}

    /* ── DIALOGUE BOX ── */
    #dialogue{
      position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
      background:rgba(10,5,25,0.98);border:3px solid #ff9800;
      color:#fff;font-family:'Press Start 2P',monospace;font-size:8px;
      padding:16px 22px 14px;max-width:500px;width:88%;text-align:left;
      line-height:2;display:none;z-index:30;
      box-shadow:0 0 40px rgba(255,152,0,0.3),inset 0 0 20px rgba(80,40,0,0.5);
    }
    #dialogue .d-speaker{
      color:#ffd700;font-size:7px;margin-bottom:10px;letter-spacing:1px;
      text-shadow:0 0 10px #ffd700;display:flex;align-items:center;gap:8px;
    }
    #dialogue .d-speaker::before{content:'';display:inline-block;width:4px;height:16px;background:#ffd700;box-shadow:0 0 8px #ffd700;}
    #dialogue .d-close{
      display:block;margin-top:10px;cursor:pointer;text-align:right;
      color:#ffd700;font-size:7px;
      padding:5px 12px; transition:background .15s;
    }
    #dialogue .d-close:hover{background:rgba(255,215,0,0.15);}

    /* Tooltip label */
    #table-tooltip {
      position: absolute;
      background: rgba(10,5,25,0.95);
      border: 2px solid #ff9800;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 7px 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(255,152,0,0.25);
      z-index: 40;
      letter-spacing: 1px;
    }
    #table-tooltip.show { opacity: 1; }

    /* Click ripple */
    .ripple{position:absolute;border-radius:50%;background:rgba(255,152,0,0.4);
      width:12px;height:12px;transform:translate(-50%,-50%) scale(0);
      animation:rpl .4s ease-out forwards;pointer-events:none;z-index:50;}
    @keyframes rpl{to{transform:translate(-50%,-50%) scale(14);opacity:0;}}
  </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="top-bar">
  <a href="hub.html" class="btn-back">◀ LOBBY</a>
  <div class="top-bar-center">🍹 JAZZ BAR — CHIPS &amp; CHIPS</div>
  <div class="fichas-box"><span class="fichas-label">FICHAS:</span><span class="fichas-count">0</span></div>
</div>

<div class="game-area">
  <div id="bar-wrap">
    <canvas id="bar-canvas"></canvas>
    <div id="table-tooltip"></div>
    <div id="luck-status"><span>🍀 SUERTE:</span><span id="luck-val">0</span></div>
    <div id="dialogue">
      <div class="d-speaker" id="d-speaker">BARTENDER</div>
      <div id="d-text">¡Bienvenido! ¿Qué te sirvo esta noche?</div>
      <div style="clear:both;"></div>
      <span class="d-close" onclick="closeDialogue()">[ CERRAR ]</span>
    </div>
  </div>

  <div class="missions-panel">
    <div class="missions-title">⚡ MISIONES ACTIVAS</div>
    <div class="mission-list" id="mission-list"></div>
  </div>
</div>

<div class="bottom-bar">
  <a href="hub.html" class="btn-option">🏠 RECEPCIÓN</a>
  <a href="utils.html" class="btn-option">⚙️ AJUSTES</a>
  <a href="casino-floor.html" class="btn-option">🎰 CASINO</a>
</div>

<div class="toast" id="toast"></div>
<script src="sounds.js"></script>
<script src="casino.js"></script>
<script>
const canvas = document.getElementById('bar-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('bar-wrap');
function resize(){ canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight; }
resize(); window.addEventListener('resize', resize);

const P=v=>Math.round(v);
function fill(x,y,w,h,col){ if(col)ctx.fillStyle=col; ctx.fillRect(P(x),P(y),P(w),P(h)); }
function circ(x,y,r,col){ ctx.beginPath();ctx.arc(P(x),P(y),r,0,Math.PI*2); if(col)ctx.fillStyle=col; ctx.fill(); }
function txt(s,x,y,col,sz,align='center'){ ctx.font=`${sz}px "Press Start 2P"`;ctx.fillStyle=col;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,P(x),P(y)); }

let tick=0;

// ═══════════════════════════════════════════
//  DRAW — ENVIRONMENT & STRUCTURE
// ═══════════════════════════════════════════
function drawStructure(){
  const W=canvas.width, H=canvas.height;
  const barY = H * 0.52;
  
  // 1. Checkered Floor (Aged tones)
  fill(0,0,W,H,'#12121c');
  for(let y=barY; y<H; y+=24){
    for(let x=0; x<W; x+=24){
      if(((x/24|0)+(y/24|0))%2===0) fill(x,y,23,23,'#1a1a28');
    }
  }

  // 2. Wall (Dark Brick)
  const gWall = ctx.createLinearGradient(0,0,0,barY);
  gWall.addColorStop(0,'#050510'); gWall.addColorStop(1,'#1b1b30');
  fill(0,0,W,barY,gWall);
  
  // Bricks lines
  ctx.fillStyle='rgba(0,0,0,0.3)';
  for(let y=0; y<barY; y+=10){
    fill(0,y,W,1,'');
  }

  // 3. Cluttered Shelves behind Bartender
  const shW=W*0.6, shH=barY*0.75, shX=(W-shW)/2, shY=barY*0.1;
  fill(shX-4, shY-4, shW+8, shH+8, '#1a1005'); // Outer thick frame
  fill(shX, shY, shW, shH, '#3a1f0a'); // Wood back
  
  // Shelf Dividers (Vertical & Horizontal Grid)
  ctx.fillStyle='#251305';
  for(let i=1; i<4; i++) fill(shX + i*(shW/4), shY, 4, shH, ''); // vertical
  for(let i=1; i<3; i++) fill(shX, shY + i*(shH/3), shW, 4, ''); // horizontal
  
  // Shelves depth labels
  ctx.fillStyle='#5a3a1a';
  for(let i=0; i<3; i++) fill(shX+2, shY + 12 + i*(shH/3), shW-4, 4, '');
  
  // BOTTLES & BOXES (The Clutter)
  const bcol=['#e74c3c','#2ecc71','#3498db','#f1c40f','#9b59b6','#ff9800','#00f5ff'];
  for(let row=0; row<3; row++){
    const ry = shY + 6 + row*(shH/3);
    for(let col=0; col<16; col++){
      const bx = shX + 10 + col*(shW/17);
      const h = 10 + Math.sin(col+row)*5;
      if(col % 5 === 0) {
         // Draw a box/crate instead of bottle
         fill(bx-2, ry+h-8, 10, 8, '#5a3a1a');
         fill(bx, ry+h-6, 6, 4, '#8b5e1a');
      } else {
         fill(bx, ry+h-5, 5, h, bcol[(col+row)%bcol.length]);
         fill(bx+1, ry+h-5, 2, h/2, 'rgba(255,255,255,0.3)'); // Shine
      }
    }
  }

  // Neon strip glow over counter area
  ctx.save();
  ctx.shadowBlur=20; ctx.shadowColor='#ffd700';
  fill(shX+20, shY+shH+5, shW-40, 2, 'rgba(255,215,0,0.8)');
  ctx.restore();
}

// ═══════════════════════════════════════════
//  DRAW — BARTENDER COUNTER
// ═══════════════════════════════════════════
function drawBarCounter(){
  const W=canvas.width, H=canvas.height;
  const barY = H*0.52, cW=W*0.6, cX=(W-cW)/2;
  const barH = 40;
  
  // 1. Counter Base (Front)
  fill(cX, barY, cW, barH, '#251a10');
  // Decorative blue glowing panels (as in reference image)
  for(let i=0; i<5; i++){
    fill(cX+10 + i*(cW/5), barY+10, (cW/5)-20, barH-20, '#1a1d45');
    fill(cX+12 + i*(cW/5), barY+12, (cW/5)-24, barH-24, '#242b6a');
  }

  // 2. Counter Top (Luminous Gold/Warm Wood)
  const gTop = ctx.createLinearGradient(0, barY-12, 0, barY);
  gTop.addColorStop(0, '#ffe066'); gTop.addColorStop(1, '#d4a017');
  fill(cX-10, barY-12, cW+20, 12, gTop);
  fill(cX-10, barY, cW+20, 2, '#8b5e1a'); // counter edge shadow
  
  // 3. Counter Objects (Clutter)
  // Notebook / Menu
  fill(cX+40, barY-10, 18, 10, '#eee');
  fill(cX+42, barY-8, 14, 2, '#ccc');
  // Small paper slips
  fill(cX+cW-80, barY-6, 8, 5, '#fff');
  fill(cX+cW-70, barY-4, 8, 5, '#fff');
  // Glass cup
  circ(cX+120, barY-6, 5, 'rgba(200,245,255,0.6)');
  // Plant in pot
  const px=cX+cW-30, py=barY-12;
  fill(px-6, py, 12, 8, '#4a2c0a'); // pot
  fill(px-5, py-10, 10, 10, '#3a7a30'); // plant
  fill(px-2, py-6, 4, 4, '#ff2d78'); // tiny flower

  // 4. Bar Stools
  for(let i=0; i<4; i++){
    const sx = cX+40+i*(cW/4.5), sy = barY+barH+40;
    fill(sx-2, barY+barH, 4, 40, '#222');
    circ(sx, sy-10, 14, '#1a1a1a'); // stool base
    circ(sx, sy-12, 11, '#251a2a'); // cushion
  }
}

// ═══════════════════════════════════════════
//  DRAW — LOUNGE FURNITURE
// ═══════════════════════════════════════════
function drawDecor(){
  const W=canvas.width, H=canvas.height;
  
  // Coat rack (Very detailed as in reference)
  const crX = W*0.08, crY = H*0.4;
  fill(crX, crY, 4, 100, '#2a1a05'); // pole
  fill(crX-12, crY+95, 28, 5, '#1a0505'); // base
  // Coat rack hooks
  for(let i=0; i<3; i++){
    const hy = crY+10+i*15;
    fill(crX-8, hy, 10, 4, '#3a1a05');
    if(i===0) fill(crX-10, hy+4, 14, 45, '#34495e'); // hanging blue coat
  }

  // Piano Area (Top Left corner)
  const pX=20, pY=20;
  fill(pX,pY,50,60,'#111'); // Grand piano body
  fill(pX+5, pY+50, 40, 6, '#fff'); // Keys
  for(let i=0;i<8;i++) fill(pX+5+i*5, pY+50, 2, 4, '#000');
  txt('JAZZ', pX+25, pY+20, 'rgba(255,255,255,0.2)', 6);

  // Posters & Boards on wall
  fill(W*0.1, 40, 35, 45, '#050505'); // Poster frame
  fill(W*0.1+2, 42, 31, 41, '#2c3e50'); // Content
  txt('BEER', W*0.1+17, 60, '#fff', 5);

  fill(W*0.88, 30, 40, 60, '#0a0a0a'); // Board
  fill(W*0.88+4, 34, 32, 52, '#1a1a1a');
  txt('MENU', W*0.88+20, 45, '#39ff14', 5);
  ctx.fillStyle='rgba(255,255,255,0.2)';
  for(let i=0; i<5; i++) fill(W*0.88+10, 55+i*6, 20, 2, '');

  // Bathroom Door (Far Right)
  const drX = W*0.92, drY = H*0.2;
  fill(drX-2, drY-2, 34, 64, '#1a1005'); // frame
  fill(drX, drY, 30, 60, '#1e8449'); // green door
  txt('BAÑO', drX+15, drY-10, '#00f5ff', 5);
}

function drawLoungeTables(){
  const W=canvas.width, H=canvas.height;
  // Foreground tables
  const drawT = (x,y) => {
    fill(x-35, y, 70, 10, '#5a3a1a'); // Table Top
    fill(x-10, y+10, 20, 25, '#2a1a0a'); // Leg base
    // Items
    circ(x-15, y-4, 5, 'rgba(200,240,255,0.6)'); // Cup
    fill(x+10, y-3, 8, 3, '#fff'); // napkin
  };
  drawT(W*0.25, H*0.88);
}

// ═══════════════════════════════════════════
//  DRAW — CHARACTERS (NPCs)
// ═══════════════════════════════════════════
function drawCharacters(){
  const W=canvas.width, H=canvas.height;
  const breath = Math.sin(tick*0.06)*2;
  
  // BARTENDER (Based on reference image)
  const bx=W*0.5, by=H*0.48;
  // Body
  fill(bx-12, by-10, 24, 25, '#5d8aa8'); // Blue apron / uniform
  fill(bx-8, by-10, 16, 25, 'rgba(0,0,0,0.1)'); // apron shading
  fill(bx-10, by-20, 20, 10, '#fff'); // shirt collar/shoulders
  // Head
  fill(bx-8, by-32-breath/2, 16, 16, '#fdd9b5'); // Skin
  fill(bx-8, by-36-breath/2, 16, 6, '#ddd'); // Grey hair (Older)
  fill(bx-4, by-26-breath/2, 8, 6, '#444'); // Beard/Mouth
  fill(bx-3, by-28-breath/2, 2, 2, '#000'); // Eyes
  fill(bx+1, by-28-breath/2, 2, 2, '#000');
  
  // NPC 1 (At bar, back to us)
  const n1x=W*0.42, n1y=H*0.58;
  fill(n1x-10, n1y, 20, 25, '#2c3e50'); // Dark jacket
  fill(n1x-8, n1y+5, 16, 15, '#c0392b'); // Red backpack
  fill(n1x-7, n1y-15+breath, 14, 15, '#1a1a1a'); // Hair

  // NPC 2 (At bar, side view - White hair child/spirit?)
  const n2x=W*0.58, n2y=H*0.6;
  fill(n2x-8, n2y, 16, 20, '#1a1a1a'); // Black clothes
  ctx.fillStyle='#e0f8ff'; // Glowing white hair
  ctx.beginPath();
  ctx.moveTo(n2x-8, n2y-5+breath);
  ctx.lineTo(n2x+8, n2y-5+breath);
  ctx.lineTo(n2x+15, n2y+25+breath);
  ctx.lineTo(n2x-5, n2y+15+breath);
  ctx.fill();
  fill(n2x-5, n2y-12+breath, 10, 10, '#fdd9b5'); // Face

  // NPC 3 & 4 at Lounge Table (as in image)
  const tX=W*0.18, tY=H*0.82;
  // NPC 3 (Suit & Hat)
  fill(tX-10, tY, 20, 25, '#5d3a1a'); // Brown suit
  fill(tX-4, tY+2, 8, 6, '#fff'); // Shirt
  fill(tX-8, tY-14+breath, 16, 14, '#f0c898'); // Head
  fill(tX-11, tY-18+breath, 22, 6, '#1a1a1a'); // Hat brim
  
  // NPC 4 (Grey Beard & Hat)
  const t2X=W*0.35;
  fill(t2X-10, tY, 20, 25, '#8b5e1a'); // Ochre coat
  fill(t2X-8, tY-14+breath, 16, 14, '#f0c898');
  fill(t2X-8, tY-4+breath, 16, 6, '#ccc'); // Large white beard
  fill(t2X-10, tY-18+breath, 22, 6, '#4a2c0a'); // Hat
}

// ═══════════════════════════════════════════
//  NPCS INTERACTION DATA
// ═══════════════════════════════════════════
const NPCS = [
  {id:'bartender',name:'BARTENDER', x:0.5, y:0.45, rx:40, ry:50},
  {id:'npc1', name:'CLIENTE (MOCHILA)', x:0.42, y:0.58, rx:30, ry:40},
  {id:'npc2', name:'CLIENTE CABELLO BLANCO', x:0.58, y:0.6, rx:30, ry:45},
  {id:'npc3', name:'PARROQUIANO ELEGANTE', x:0.18, y:0.82, rx:30, ry:40},
  {id:'npc4', name:'VIEJO DEL BAR', x:0.35, y:0.82, rx:30, ry:40},
  {id:'piano', name:'PIANO JAZZ', x:0.07, y:0.1, rx:50, ry:50},
  {id:'bathroom', name:'IR AL BAÑO', x:0.94, y:0.25, rx:40, ry:60},
  {id:'exit', name:'SALIR AL LOBBY', x:0.04, y:0.5, rx:30, ry:50}
];

// ═══════════════════════════════════════════
//  ATMOSPHERE & RENDER
// ═══════════════════════════════════════════
let particles = [];
for(let i=0; i<15; i++) particles.push({x:Math.random(), y:Math.random(), s:1+Math.random()*2, spd:0.0003+Math.random()*0.0005});

function drawAtmosphere(){
  const W=canvas.width, H=canvas.height;
  
  // 1. Counter Floor Glow (Central highlight)
  ctx.globalCompositeOperation = 'screen';
  const gGlow = ctx.createRadialGradient(W/2, H*0.5, 0, W/2, H*0.5, W*0.4);
  gGlow.addColorStop(0, 'rgba(255,180,50,0.15)');
  gGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = gGlow; ctx.fillRect(0,0,W,H);
  
  // 2. Ceiling Spotlights
  for(let i=0; i<3; i++){
    const lx = W*(0.2 + i*0.3);
    const gSpot = ctx.createRadialGradient(lx, 0, 0, lx, H*0.3, W*0.3);
    gSpot.addColorStop(0, 'rgba(255,230,150,0.08)');
    gSpot.addColorStop(1, 'transparent');
    ctx.fillStyle = gSpot; ctx.fillRect(0,0,W,H);
  }
  ctx.globalCompositeOperation = 'source-over';

  // 3. Dust Motes
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  particles.forEach(p => {
    p.y -= p.spd; if(p.y<0) p.y=1;
    fill(p.x*W, p.y*H, p.s, p.s, '');
  });

  // 4. Global Vignette
  const gVign = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, W*0.8);
  gVign.addColorStop(0, 'transparent');
  gVign.addColorStop(1, 'rgba(0,0,0,0.6)');
  fill(0,0,W,H,gVign);
  
  // Warm color tint
  ctx.fillStyle = 'rgba(50,20,0,0.1)';
  ctx.fillRect(0,0,W,H);
}

function draw(){
  tick++;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  drawStructure();
  drawDecor();
  drawBarCounter();
  drawLoungeTables();
  drawCharacters();
  drawAtmosphere();

  requestAnimationFrame(draw);
}

const tooltip = document.getElementById('table-tooltip');
let hovered = null;
function getHit(mx,my){
  const W=canvas.width, H=canvas.height;
  for(let n of NPCS){
    const cx=W*n.x, cy=H*n.y;
    const dx=(mx-cx)/n.rx, dy=(my-cy)/n.ry;
    if(dx*dx+dy*dy<1) return n;
  }
  return null;
}
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(canvas.width/r.width);
  const my=(e.clientY-r.top)*(canvas.height/r.height);
  hovered = getHit(mx,my);
  canvas.style.cursor = hovered?'pointer':'default';
  if(hovered){
    tooltip.textContent = hovered.name;
    const px = hovered.x * wrap.clientWidth;
    const py = hovered.y * wrap.clientHeight;
    tooltip.style.left = (px - tooltip.offsetWidth/2) + 'px';
    tooltip.style.top  = (py - 30) + 'px';
    tooltip.classList.add('show');
  } else tooltip.classList.remove('show');
});
canvas.addEventListener('click',e=>{
  if(!hovered) return;
  if(hovered.id==='exit') window.location.href='hub.html';
  else if(hovered.id==='piano') showToast('🎹 LIVE JAZZ SOLO','#ffd700');
  else if(hovered.id==='bathroom') window.location.href='bano.html';
  // Diálogos desactivados por petición
});

const dlg=document.getElementById('dialogue');
function showDlg(name,text){
  document.getElementById('d-speaker').textContent=name;
  document.getElementById('d-text').textContent=text;
  dlg.style.display='block';
}
function closeDialogue(){ dlg.style.display='none'; }
draw();
</script>
</body>
