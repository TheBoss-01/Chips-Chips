<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chips & Chips — The Pixel Casino</title>
  <meta name="description" content="Chips & Chips, el casino pixel art más emocionante." />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game.css" />
  <style>
    /* ── RESET & STRUCTURE ── */
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%; overflow: hidden;
      background: #050510;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
    }
    
    /* ── SCENE WRAPPER ── */
    #exterior-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #050510 0%, #0d0628 50%, #150220 100%);
    }

    /* ── CANVAS (Pixel Art Exterior) ── */
    #exterior-canvas {
      width: 100%; height: 100%;
      image-rendering: pixelated;
      cursor: default;
    }

    /* ── LOGIN PANEL OVERLAY ── */
    .login-overlay {
      position: absolute;
      top: 60%; left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(160deg, rgba(20,10,40,0.92), rgba(10,5,25,0.95));
      border: 4px solid #7c3aed;
      border-top: 4px solid #c084fc;
      border-bottom: 6px solid #4a187a;
      padding: 30px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 50px rgba(124,58,237,0.4), 0 20px 40px rgba(0,0,0,0.8);
      z-index: 100;
      animation: floatPanel 4s ease-in-out infinite;
    }
    @keyframes floatPanel {
      0%, 100% { transform: translate(-50%, -50%); }
      50%      { transform: translate(-50%, -52%); }
    }

    .login-overlay h1 {
      color: #ffd700;
      font-size: 14px;
      margin-bottom: 24px;
      text-shadow: 0 0 10px #ffd700, 2px 2px 0 #7a5000;
      letter-spacing: 2px;
    }

    .input-box { margin-bottom: 16px; position: relative; }
    .input-box input {
      width: 100%; box-sizing: border-box;
      background: rgba(0,0,0,0.6);
      border: 2px solid #5b21b6;
      color: #e0f8ff; font-family: 'Press Start 2P', monospace;
      font-size: 8px; padding: 14px 14px 14px 30px;
      transition: all 0.2s;
    }
    .input-box input:focus {
      outline: none; border-color: #00f5ff;
      box-shadow: 0 0 15px rgba(0,245,255,0.3);
      background: rgba(0,20,50,0.7);
    }
    .input-box .icon {
      position: absolute; left: 10px; top: 12px;
      font-size: 10px; opacity: 0.7;
    }

    .btn-enter {
      width: 100%;
      background: linear-gradient(180deg, #c0392b 0%, #922b21 100%);
      border: 2px solid #e74c3c;
      border-bottom: 4px solid #641e16;
      color: #fff;
      font-family: inherit; font-size: 10px;
      padding: 14px; margin-top: 10px;
      cursor: pointer;
      text-shadow: 2px 2px 0 #641e16;
      transition: all 0.1s;
    }
    .btn-enter:hover {
      background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
      transform: translateY(-2px); box-shadow: 0 4px 15px rgba(231,76,60,0.4);
    }
    .btn-enter:active { transform: translateY(2px); border-bottom-width: 2px; margin-top: 12px; margin-bottom: 2px; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100%);
      background: rgba(0,5,15,0.9); border: 2px solid #00f5ff; padding: 12px 20px;
      color: #00f5ff; font-size: 8px; opacity: 0; pointer-events: none; z-index: 1000;
      transition: all 0.3s cubic-bezier(0.34,1.5,0.64,1);
      box-shadow: 0 0 20px rgba(0,245,255,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="exterior-wrap">
    <canvas id="exterior-canvas"></canvas>
    
    <!-- Login Form -->
    <div class="login-overlay">
      <h1>CHIPS & CHIPS</h1>
      <form onsubmit="handleLogin(event)">
        <div class="input-box">
          <span class="icon">👤</span>
          <input type="text" id="username" placeholder="TU NOMBRE" autocomplete="off" required />
        </div>
        <button type="submit" class="btn-enter" id="btn-enter">ENTRAR AL CASINO</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="sounds.js"></script>
  <script>
    // ═══════════════════════════════════════════
    //  LOGIN LOGIC
    // ═══════════════════════════════════════════
    function handleLogin(e) {
      e.preventDefault();
      typeof SFX !== 'undefined' && SFX.click();
      const u = document.getElementById('username').value.trim();
      if (!u) {
        typeof SFX !== 'undefined' && SFX.lose();
        showToast('Escribe un nombre!', '#ff2d78');
        return;
      }
      localStorage.setItem('cc_user', u.toUpperCase());
      if(!localStorage.getItem('cc_fichas')) localStorage.setItem('cc_fichas', '1000');
      
      typeof SFX !== 'undefined' && SFX.win();
      showToast('Bienvenido, ' + u.toUpperCase() + '!', '#39ff14');
      
      // Flash screen transition
      const flash = document.createElement('div');
      flash.style.cssText = 'position:fixed;inset:0;background:#fff;opacity:0;z-index:9999;transition:opacity 0.6s;';
      document.body.appendChild(flash);
      setTimeout(()=>flash.style.opacity='1', 10);
      
      setTimeout(() => { window.location.href = 'hub.html'; }, 800);
    }

    function showToast(msg, color='#00f5ff') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.borderColor = color; t.style.color = color;
      t.style.boxShadow = `0 0 20px ${color}60`;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ═══════════════════════════════════════════
    //  CANVAS EXPERIOR PIXEL ART
    // ═══════════════════════════════════════════
    const canvas = document.getElementById('exterior-canvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
      canvas.width = document.getElementById('exterior-wrap').clientWidth;
      canvas.height = document.getElementById('exterior-wrap').clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Setup helper
    const P = Math.round;
    const fill = (x,y,w,h,c) => { ctx.fillStyle=c; ctx.fillRect(P(x),P(y),P(w),P(h)); };
    
    let tick = 0;
    const rainDrops = Array(60).fill().map(() => ({ x:Math.random(), y:Math.random(), v:0.02+Math.random()*0.02 }));

    function drawBuilding(W, H) {
      const bW = Math.min(600, W * 0.8);
      const bH = H * 0.8;
      const bX = (W - bW) / 2;
      const bY = H - bH;

      // Dark skyline
      const gbg = ctx.createLinearGradient(0,0,0,H);
      gbg.addColorStop(0,'#05020a'); gbg.addColorStop(1,'#150525');
      fill(0,0,W,H,gbg);

      // Distant city lights
      ctx.fillStyle='rgba(255,255,150,0.1)';
      for(let i=0;i<20;i++) fill((i*W/20)%W, (H*0.4)+(Math.sin(i*123)*H*0.1), 4, 4, 'rgba(255,200,100,0.2)');

      // Main Building Block
      fill(bX, bY, bW, bH, '#0a0a0a'); // base
      fill(bX+10, bY+10, bW-20, bH-10, '#111'); 

      // Casino Entrance Pillars
      const pW = bW * 0.15;
      fill(bX + bW*0.2, bY+bH*0.4, pW, bH*0.6, '#1a1a1a');
      fill(bX + bW*0.65, bY+bH*0.4, pW, bH*0.6, '#1a1a1a');
      
      // Giant Red Carpet
      fill(bX+bW*0.35, H-20, bW*0.3, 20, '#600');
      fill(bX+bW*0.38, H-20, bW*0.24, 20, '#900');

      // Doors (Golden)
      fill(bX+bW*0.38, H-120, bW*0.12, 120, '#d4a000');
      fill(bX+bW*0.5, H-120, bW*0.12, 120, '#d4a000');
      // Glass
      fill(bX+bW*0.4, H-100, bW*0.08, 90, '#0a2a40');
      fill(bX+bW*0.52, H-100, bW*0.08, 90, '#0a2a40');

      // Neon Sign "CHIPS & CHIPS"
      const neonFlicker = Math.random() > 0.95 ? 'rgba(255,240,100,0.4)' : '#ffd700';
      const glowStr = Math.random() > 0.95 ? 5 : 20;

      ctx.save();
      ctx.shadowBlur = glowStr;
      ctx.shadowColor = neonFlicker;
      ctx.fillStyle = neonFlicker;
      ctx.textAlign = 'center';
      
      // Marquee Box
      fill(bX+bW*0.1, bY+bH*0.1, bW*0.8, 80, '#220');
      ctx.strokeStyle = neonFlicker;
      ctx.lineWidth = 4;
      ctx.strokeRect(P(bX+bW*0.12), P(bY+bH*0.1+10), P(bW*0.76), 60);

      // Title
      ctx.font = '24px "Press Start 2P"';
      ctx.fillText('CHIPS & CHIPS', bX+bW/2, bY+bH*0.1 + 54);
      ctx.restore();

      // Flashing border bulbs on Marquee
      const bulbs = 20;
      const bSpace = (bW*0.76) / bulbs;
      for(let i=0; i<=bulbs; i++) {
        const active = (i + Math.floor(tick/10)) % 2 === 0;
        ctx.fillStyle = active ? '#fff' : '#444';
        ctx.beginPath();
        ctx.arc(bX+bW*0.12 + i*bSpace, bY+bH*0.1+5, 4, 0, Math.PI*2);
        ctx.arc(bX+bW*0.12 + i*bSpace, bY+bH*0.1+75, 4, 0, Math.PI*2);
        ctx.fill();
      }

      // Draw Bouncer NPC (Standing left of door)
      const npcX = bX + bW*0.28;
      const npcY = H - 65;
      const breath = Math.sin(tick*0.05)*2;
      fill(npcX, npcY-breath, 20, 20, '#111'); // body suit
      fill(npcX+4, npcY-breath+2, 4, 10, '#fff'); // shirt
      fill(npcX+4, npcY-breath+2, 2, 6, '#900'); // tie
      fill(npcX+2, npcY-breath-14, 16, 14, '#c68642'); // head
      fill(npcX+2, npcY-breath-10, 16, 4, '#000'); // shades
      
      // Rain
      ctx.fillStyle = 'rgba(100, 150, 255, 0.4)';
      rainDrops.forEach(r => {
        r.y += r.v * 5;
        r.x += 0.002;
        if (r.y > 1) { r.y = 0; r.x = Math.random(); }
        fill(r.x*W, r.y*H, 1, 10, 'rgba(100,150,255,0.4)');
      });
      
      // Puddle reflections
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = 'rgba(255,215,0,0.05)';
      ctx.fillRect(bX+bW*0.2, H-10, bW*0.6, 10);
      ctx.globalCompositeOperation = 'source-over';
    }

    function render() {
      tick++;
      drawBuilding(canvas.width, canvas.height);
      requestAnimationFrame(render);
    }
    
    // Attach music starter for the wrapper
    const startAudio = () => {
      if(typeof SFX!=='undefined') SFX.startBgMusic();
      document.removeEventListener('click', startAudio);
      document.removeEventListener('keydown', startAudio);
    };
    document.addEventListener('click', startAudio);
    document.addEventListener('keydown', startAudio);

    // Attach input SFX manually since casino.js isn't fully loaded yet 
    document.querySelectorAll('input, button').forEach(el=>el.addEventListener('focus', ()=>typeof SFX!=='undefined'&&SFX.uiBlip()));

    requestAnimationFrame(render);
  </script>
</body>
</html>
